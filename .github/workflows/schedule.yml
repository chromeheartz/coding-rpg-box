name: Update RPG stats box

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00) 에 갱신
    - cron: "0 22 * * *"
  workflow_dispatch: # Actions 탭에서 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate & update stats
        run: node index.js
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          TZ: Asia/Seoul
